# ═══════════════════════════════════════════════════════════════
# iMestreDigital - Nginx Principal
# ═══════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ───────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ─── Performance ───────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ─── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── Security Headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Rate Limiting ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ─── Upstreams (microserviços) ────────────────────────
    upstream web {
        server web:3000;
    }

    upstream auth_service {
        server auth-service:3001;
    }

    upstream fiscal_service {
        server fiscal-service:3004;
    }

    upstream order_service {
        server order-service:3005;
    }

    upstream financial_service {
        server financial-service:3006;
    }

    upstream marketplace_service {
        server marketplace-service:3007;
    }

    upstream ai_service {
        server ai-service:3008;
    }

    upstream notification_service {
        server notification-service:3009;
    }

    upstream catalog_service {
        server catalog-service:3010;
    }

    upstream inventory_service {
        server inventory-service:3011;
    }

    upstream customer_service {
        server customer-service:3012;
    }

    # ─── Incluir server blocks ────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
