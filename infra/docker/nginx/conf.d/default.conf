# ═══════════════════════════════════════════════════════════════
# iMestreDigital - Server Block Principal
# ═══════════════════════════════════════════════════════════════
# Substitua SEUDOMINIO.COM.BR pelo seu domínio real.
# O script deploy.sh faz isso automaticamente.
# ═══════════════════════════════════════════════════════════════

# ─── Redirect HTTP → HTTPS ─────────────────────────────────
server {
    listen 80;
    server_name SEUDOMINIO.COM.BR;

    # Certbot challenge (necessário para gerar o SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name SEUDOMINIO.COM.BR;

    # ─── SSL Certificates ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/SEUDOMINIO.COM.BR/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEUDOMINIO.COM.BR/privkey.pem;

    # ─── SSL Config Moderna ───────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ═══════════════════════════════════════════════════════
    # ROTAS DE API → MICROSERVIÇOS
    # ═══════════════════════════════════════════════════════

    # ─── Auth ──────────────────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://auth_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Fiscal ────────────────────────────────────────────
    location /api/v1/notas-fiscais/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://fiscal_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Pedidos ───────────────────────────────────────────
    location /api/v1/pedidos/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://order_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Financeiro ────────────────────────────────────────
    location ~ ^/api/v1/(lancamentos|contas|categorias|fluxo-caixa|dre)/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://financial_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Marketplace ───────────────────────────────────────
    location ~ ^/api/v1/(marketplace|anuncios)/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://marketplace_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── IA ────────────────────────────────────────────────
    location ~ ^/api/v1/(insights|assistente|sugestoes|previsao)/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://ai_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Notificações ──────────────────────────────────────
    location /api/v1/notificacoes/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://notification_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Catálogo / Produtos ───────────────────────────────
    location /api/v1/produtos/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://catalog_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Estoque ───────────────────────────────────────────
    location /api/v1/estoque/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://inventory_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Clientes / CRM ───────────────────────────────────
    location /api/v1/clientes/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://customer_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Dashboard (frontend mock ou agregado) ─────────────
    location /api/v1/dashboard/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Caixa / PDV (frontend mock) ──────────────────────
    location ~ ^/api/v1/(caixa|cobranca|compras|ia|fiscal)/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ═══════════════════════════════════════════════════════
    # FRONTEND (Next.js)
    # ═══════════════════════════════════════════════════════
    location / {
        proxy_pass http://web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Next.js static assets ────────────────────────────
    location /_next/static/ {
        proxy_pass http://web;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Favicon e assets públicos ────────────────────────
    location /favicon.ico {
        proxy_pass http://web;
        expires 30d;
    }
}
