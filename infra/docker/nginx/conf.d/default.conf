# ═══════════════════════════════════════════════════════════════
# iMestreDigital - Server Block (HTTP temporário, pré-SSL)
# ═══════════════════════════════════════════════════════════════
# Usa resolver Docker DNS (127.0.0.11) + variáveis no proxy_pass
# para resolver hostnames em runtime. Serviços não-deployados
# não quebram o reload.
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name imestredigital.cloud _;

    # Docker embedded DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ═══════════════════════════════════════════════════════
    # ROTAS DE API → MICROSERVIÇOS
    # ═══════════════════════════════════════════════════════

    # ─── Auth (3001) ───────────────────────────────────────
    location ~ ^/api/v1/auth(/|$) {
        # limit_req zone=auth burst=10 nodelay;  # TODO: reativar após validar zonas no nginx.conf
        set $backend_auth http://auth-service:3001;
        proxy_pass $backend_auth;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Catálogo / Produtos (3010) ────────────────────────
    location ~ ^/api/v1/produtos(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_catalog http://catalog-service:3010;
        proxy_pass $backend_catalog;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/categorias(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_catalog_cat http://catalog-service:3010;
        proxy_pass $backend_catalog_cat;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/marcas(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_catalog_marca http://catalog-service:3010;
        proxy_pass $backend_catalog_marca;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Estoque (3011) ───────────────────────────────────
    location ~ ^/api/v1/estoque(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_inventory http://inventory-service:3011;
        proxy_pass $backend_inventory;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Pedidos (3005) ───────────────────────────────────
    location ~ ^/api/v1/pedidos(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_order http://order-service:3005;
        proxy_pass $backend_order;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Financeiro (3006) ────────────────────────────────
    location ~ ^/api/v1/(lancamentos|contas|categorias-financeiras|fluxo-caixa|dre)(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_financial http://financial-service:3006;
        proxy_pass $backend_financial;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Clientes / CRM (3012) ───────────────────────────
    location ~ ^/api/v1/clientes(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_customer http://customer-service:3012;
        proxy_pass $backend_customer;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Fiscal (3004) ────────────────────────────────────
    location ~ ^/api/v1/notas-fiscais(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_fiscal http://fiscal-service:3004;
        proxy_pass $backend_fiscal;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Marketplace (3007) ───────────────────────────────
    location ~ ^/api/v1/(marketplace|anuncios)(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_marketplace http://marketplace-service:3007;
        proxy_pass $backend_marketplace;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── IA (3008) ────────────────────────────────────────
    location ~ ^/api/v1/(insights|assistente|sugestoes|previsao)(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_ai http://ai-service:3008;
        proxy_pass $backend_ai;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Notificações (3009) ──────────────────────────────
    location ~ ^/api/v1/notificacoes(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        set $backend_notification http://notification-service:3009;
        proxy_pass $backend_notification;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Dashboard + rotas mock (Next.js) ─────────────────
    location ~ ^/api/v1/dashboard(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        proxy_pass http://web:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/(caixa|cobranca|compras)(/|$) {
        # limit_req zone=api burst=20 nodelay;  # TODO: reativar
        proxy_pass http://web:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ═══════════════════════════════════════════════════════
    # FRONTEND (Next.js)
    # ═══════════════════════════════════════════════════════
    location / {
        proxy_pass http://web:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /_next/static/ {
        proxy_pass http://web:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        proxy_pass http://web:3000;
        expires 30d;
    }
}
