# ═══════════════════════════════════════════════════════════════
# iMestreDigital - Server Block (HTTP temporário, pré-SSL)
# ═══════════════════════════════════════════════════════════════
# Após configurar SSL via certbot, substituir por versão HTTPS.
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name imestredigital.cloud _;

    # Certbot challenge (necessário para gerar o SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ═══════════════════════════════════════════════════════
    # ROTAS DE API → MICROSERVIÇOS
    # ═══════════════════════════════════════════════════════
    # Regex locations casam com e sem trailing slash.
    # Sem trailing slash, Nginx prefix match "/api/v1/produtos/"
    # NÃO casa com "/api/v1/produtos" → cai no fallback mock.

    # ─── Auth ──────────────────────────────────────────────
    location ~ ^/api/v1/auth(/|$) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://auth_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Catálogo / Produtos ───────────────────────────────
    location ~ ^/api/v1/produtos(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://catalog_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Categorias do catálogo ────────────────────────────
    location ~ ^/api/v1/categorias(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://catalog_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Marcas do catálogo ────────────────────────────────
    location ~ ^/api/v1/marcas(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://catalog_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Estoque ───────────────────────────────────────────
    location ~ ^/api/v1/estoque(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://inventory_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Pedidos ───────────────────────────────────────────
    location ~ ^/api/v1/pedidos(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://order_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Financeiro ────────────────────────────────────────
    location ~ ^/api/v1/(lancamentos|contas|categorias-financeiras|fluxo-caixa|dre)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://financial_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Clientes / CRM ───────────────────────────────────
    location ~ ^/api/v1/clientes(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://customer_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Fiscal ────────────────────────────────────────────
    location ~ ^/api/v1/notas-fiscais(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://fiscal_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Marketplace ───────────────────────────────────────
    location ~ ^/api/v1/(marketplace|anuncios)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://marketplace_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── IA ────────────────────────────────────────────────
    location ~ ^/api/v1/(insights|assistente|sugestoes|previsao)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://ai_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Notificações ──────────────────────────────────────
    location ~ ^/api/v1/notificacoes(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://notification_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Dashboard + rotas mock (servidas pelo Next.js) ────
    location ~ ^/api/v1/dashboard(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/(caixa|cobranca|compras)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ═══════════════════════════════════════════════════════
    # FRONTEND (Next.js)
    # ═══════════════════════════════════════════════════════
    location / {
        proxy_pass http://web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ─── Next.js static assets ────────────────────────────
    location /_next/static/ {
        proxy_pass http://web;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        proxy_pass http://web;
        expires 30d;
    }
}
